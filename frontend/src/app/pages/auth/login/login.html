<div class="login-page bg-body-secondary min-vh-100 d-flex align-items-center justify-content-center">
  <div class="login-box">
    <div class="login-logo">
      <a href="#"><b>ERP</b>CRM</a>
    </div>
    <div class="card">
      <div class="card-body login-card-body">
        <p class="login-box-msg">Ingresá tus credenciales para continuar</p>

        <form (ngSubmit)="onSubmit()">
          <!-- Email -->
          <div class="input-group mb-3">
            <input
              type="email"
              class="form-control"
              placeholder="Correo electrónico"
              [(ngModel)]="email"
              name="email"
              required
            />
            <div class="input-group-text">
              <span class="bi bi-envelope"></span>
            </div>
          </div>

          <!-- Contraseña -->
          <div class="input-group mb-3">
            <input
              type="password"
              class="form-control"
              placeholder="Contraseña"
              [(ngModel)]="password"
              name="password"
              required
            />
            <div class="input-group-text">
              <span class="bi bi-lock-fill"></span>
            </div>
          </div>

          <!-- Error -->
          @if (errorMessage) {
            <div class="alert alert-danger py-2 text-sm">
              {{ errorMessage }}
            </div>
          }

          <!-- Acciones -->
          <div class="row">
            <div class="col-8">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember" />
                <label class="form-check-label" for="remember">Recordarme</label>
              </div>
            </div>
            <div class="col-4">
              <div class="d-grid">
                <button type="submit" class="btn btn-primary" [disabled]="loading">
                  @if (loading) {
                    <span class="spinner-border spinner-border-sm me-1"></span>
                  }
                  Ingresar
                </button>
              </div>
            </div>
          </div>
        </form>

        <p class="mb-1 mt-3">
          <a href="#">¿Olvidaste tu contraseña?</a>
        </p>
        <p class="mb-0">
          <a routerLink="/auth/register">Crear una cuenta nueva</a>
        </p>
      </div>
    </div>
  </div>
</div>
