version: "3.9"

services:
  db: 
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: erp_1234
      POSTGRES_DB: erp_db
    ports:
      - "5433:5432" # cambie al 5433 para evitar conflictos con una instalación local de PostgreSQL
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: